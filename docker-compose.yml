name: fabrica-fice

services:
  db:
    container_name: fabrica-fice-db
    image: pgvector/pgvector:pg17
    env_file: .env
    environment:
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - fabrica-fice-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fabrica-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    container_name: fabrica-fice-web
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - APP_ENV=development
      - APP_VERSION=dev
      - POSTGRES_HOST=db
    volumes:
      # hot reload — monta o código local no container
      - .:/app
      - /app/node_modules
    networks:
      - fabrica-network
    restart: unless-stopped

volumes:
  fabrica-fice-data:

networks:
  fabrica-network:
    driver: bridge
