<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Stand - registro de visitante</title>
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 24px;
    }

    video {
      width: 480px;
      max-width: 90vw;
      border-radius: 8px;
      background: #000;
    }

    button {
      font-size: 18px;
      padding: 12px 24px;
      margin-top: 16px;
      cursor: pointer;
    }

    #status {
      margin-top: 16px;
      font-size: 18px;
      min-height: 24px;
    }
  </style>
</head>

<body>
  <h1>Stand da feira - toque a tela para registrar sua visita</h1>
  <video id="video" autoplay muted playsinline></video>
  <br>
  <button id="captureBtn" disabled>Carregando camera...</button>
  <div id="status"></div>

  <script src="js/face-utils.js"></script>
  <script>
    const video = document.getElementById('video');
    const btn = document.getElementById('captureBtn');
    const statusEl = document.getElementById('status');

    async function init() {
      await loadModels();
      await startWebcam(video);
      btn.disabled = false;
      btn.textContent = 'Registrar minha visita';
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      statusEl.textContent = 'Detectando rosto...';

      const embedding = await captureDescriptor(video);
      if (!embedding) {
        statusEl.textContent = 'Nao consegui ver seu rosto, tente novamente.';
        btn.disabled = false;
        return;
      }

      statusEl.textContent = 'Enviando...';
      const result = await sendToApi('/api/capture', embedding);

      if (result.status === 'registered') {
        statusEl.textContent = 'Visita registrada com sucesso!';
      } else if (result.status === 'already_registered') {
        statusEl.textContent = 'Voce ja estava registrado, tudo certo.';
      } else {
        statusEl.textContent = 'Erro: ' + (result.error || 'tente novamente');
      }

      btn.disabled = false;
    });

    init();
  </script>
</body>

</html>
